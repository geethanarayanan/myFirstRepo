apiVersion: asset.sap/v1
kind: Asset

metadata:
  name: collection-email-drafting-agent
  version: 1.0.0
  description: AI agent that drafts personalized collection emails using dunning history and dispute context from SAP S/4HANA

type: agent

container:
  buildPath: .
  port: 5000

requires:
  - name: contract-accounting-dunning-history-mcp-demo
    kind: mcp-server
    ordId: sap.mcpbuilder:apiResource:contract_accounting_dunning_history_mcp_demo:v1

probes:
  startup:
    path: /.well-known/agent.json
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 18
  liveness:
    path: /.well-known/agent.json
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    path: /.well-known/agent.json
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
