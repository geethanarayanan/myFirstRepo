apiVersion: asset.sap/v1
kind: Asset

metadata:
  name: collections-agent
  version: 1.0.0
  description: AI collections agent that autonomously reasons over customer payment history and account context to draft personalised collection emails and recommend escalation actions.

type: agent

container:
  buildPath: .
  port: 5000

requires:
  - name: contract-accounting-dunning-history-mcp
    kind: mcp-server
    ordId: sap.mcpbuilder:apiResource:contract_accounting_dunning_history_mcp_demo:v1

probes:
  startup:
    path: /.well-known/agent.json
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 18
  liveness:
    path: /.well-known/agent.json
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    path: /.well-known/agent.json
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
